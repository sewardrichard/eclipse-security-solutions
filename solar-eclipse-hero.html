<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: auto; }

  body {
    background: #000;
    height: 300vh;
    overflow-x: hidden;
  }

  /* ── STAR CANVAS (background) ───────────────────── */
  #starCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── HERO ────────────────────────────────────────── */
  .hero {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* ── ECLIPSE STACK ───────────────────────────────── */
  .eclipse {
    position: relative;
    width: 260px;
    height: 260px;
  }

  /* Far glow — outermost warm bleed, expands at totality */
  .glow-far {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle,
      transparent 38%,
      rgba(255,200,80,0.08) 48%,
      rgba(233,152,24,0.05) 60%,
      rgba(200,100,10,0.025) 73%,
      transparent 84%
    );
    opacity: 0;
    z-index: 2;
    pointer-events: none;
    /* size/position driven by JS */
  }

  /* Mid glow — the main corona body */
  .glow-mid {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle,
      transparent 40%,
      rgba(255,240,160,0.16) 46%,
      rgba(255,200,80,0.11) 53%,
      rgba(233,152,24,0.07) 62%,
      rgba(200,100,10,0.03) 73%,
      transparent 82%
    );
    opacity: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* Inner halo — very bright tight burst right at the limb */
  .glow-inner {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle,
      transparent 46%,
      rgba(255,255,220,0.22) 50%,
      rgba(255,220,100,0.15) 55%,
      rgba(233,152,24,0.08) 62%,
      transparent 72%
    );
    opacity: 0;
    z-index: 4;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  /* Ring glow — tight bright halo at the limb */
  .glow-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    opacity: 0;
    z-index: 5;
    pointer-events: none;
    /* animated at totality via keyframe */
  }

  /* Totality ring animation — slow breathing */
  @keyframes ringBreathe {
    0%, 100% {
      box-shadow:
        0 0 0 1.5px rgba(255,248,200,0.70),
        0 0  6px  3px rgba(255,220,120,0.45),
        0 0 20px  9px rgba(233,152,24,0.22),
        0 0 55px 22px rgba(200,110,10,0.10),
        0 0 110px 44px rgba(180,90,5,0.045);
    }
    50% {
      box-shadow:
        0 0 0 1.5px rgba(255,255,220,0.85),
        0 0  9px  5px rgba(255,230,140,0.58),
        0 0 30px 13px rgba(233,152,24,0.30),
        0 0 75px 30px rgba(200,110,10,0.14),
        0 0 150px 58px rgba(180,90,5,0.06);
    }
  }
  .glow-ring.active {
    animation: ringBreathe 4s ease-in-out infinite;
  }

  /* Chromosphere */
  .chromo {
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    z-index: 6;
    pointer-events: none;
    transition: box-shadow 0.8s ease;
  }

  /* SUN — drawn as a canvas so moon truly occludes it */
  #sunCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    z-index: 4;
    pointer-events: none;
  }

  /* MOON */
  .moon {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 46% 44%,
      #080a0d 0%,
      #050608 55%,
      #020304 100%
    );
    z-index: 10;
    will-change: transform;
  }

  /* ── SCROLL CUE ──────────────────────────────────── */
  .scroll-cue {
    position: fixed;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    opacity: 1;
    transition: opacity 0.5s ease;
  }
  .scroll-cue.hidden { opacity: 0; pointer-events: none; }
  .scroll-line {
    width: 1px;
    height: 36px;
    background: linear-gradient(to bottom, transparent, rgba(233,152,24,0.35));
    animation: scrollPulse 2.6s ease-in-out infinite;
  }
  @keyframes scrollPulse {
    0%,100% { opacity: 0.2; transform: scaleY(0.65); }
    50%      { opacity: 0.9; transform: scaleY(1); }
  }
</style>
</head>
<body>

<!-- Stars + shooting stars -->
<canvas id="starCanvas"></canvas>

<div class="hero">
  <div class="eclipse" id="eclipse">
    <div class="glow-far"   id="glowFar"></div>
    <div class="glow-mid"   id="glowMid"></div>
    <div class="glow-inner" id="glowInner"></div>
    <canvas id="sunCanvas"></canvas>
    <div class="glow-ring" id="glowRing"></div>
    <div class="chromo"    id="chromo"></div>
    <div class="moon"      id="moon"></div>
  </div>
</div>

<div class="scroll-cue" id="scrollCue">
  <div class="scroll-line"></div>
</div>

<script>
(() => {
  // ── CONSTANTS ─────────────────────────────────────────
  const MOON_MAX  = 440;
  const TOTALITY  = 20;
  const ENTRY_MS  = 2200;
  const SUN_COLOR = '#e99818';
  const SUN_R     = 130; // radius in px (canvas is 260x260)

  // ── ELEMENTS ──────────────────────────────────────────
  const moon      = document.getElementById('moon');
  const glowRing  = document.getElementById('glowRing');
  const glowMid   = document.getElementById('glowMid');
  const glowInner = document.getElementById('glowInner');
  const glowFar   = document.getElementById('glowFar');
  const chromo    = document.getElementById('chromo');
  const scrollCue = document.getElementById('scrollCue');
  const eclipse   = document.getElementById('eclipse');

  // ── SUN CANVAS ────────────────────────────────────────
  const sunCvs = document.getElementById('sunCanvas');
  const sunCtx = sunCvs.getContext('2d');
  sunCvs.width  = 260;
  sunCvs.height = 260;

  function drawSun() {
    sunCtx.clearRect(0, 0, 260, 260);
    const g = sunCtx.createRadialGradient(130, 130, 0, 130, 130, 130);
    g.addColorStop(0.00, '#fff4d0');   // hot white centre
    g.addColorStop(0.18, '#ffd060');   // bright yellow
    g.addColorStop(0.45, '#e99818');   // amber — the key colour
    g.addColorStop(0.72, '#c06010');   // deep orange
    g.addColorStop(0.90, '#7a2e00');   // dark red-brown edge
    g.addColorStop(1.00, '#3a1000');   // near-black limb
    sunCtx.beginPath();
    sunCtx.arc(130, 130, 130, 0, Math.PI * 2);
    sunCtx.fillStyle = g;
    sunCtx.fill();
  }
  drawSun();

  // ── STAR + SHOOTING STAR CANVAS ───────────────────────
  const sCvs = document.getElementById('starCanvas');
  const sCtx = sCvs.getContext('2d');

  function resizeStarCanvas() {
    sCvs.width  = window.innerWidth;
    sCvs.height = window.innerHeight;
  }
  resizeStarCanvas();
  window.addEventListener('resize', resizeStarCanvas);

  // Generate fixed stars
  const STAR_COUNT = 160;
  const stars = Array.from({ length: STAR_COUNT }, () => ({
    x:    Math.random(),
    y:    Math.random(),
    r:    Math.random() * 0.9 + 0.3,
    base: Math.random() * 0.35 + 0.08,       // base opacity
    amp:  Math.random() * 0.25 + 0.05,       // twinkle amplitude
    freq: Math.random() * 0.0008 + 0.0003,   // twinkle speed
    phase:Math.random() * Math.PI * 2,
  }));

  // Shooting stars pool
  const shoots = [];
  function spawnShoot() {
    const side = Math.random() > 0.5;
    shoots.push({
      x:    side ? Math.random() * 0.4 : Math.random() * 0.6 + 0.4,
      y:    Math.random() * 0.5,
      len:  Math.random() * 120 + 60,
      speed:Math.random() * 0.0006 + 0.0004,
      angle:Math.PI / 4 + (Math.random() - 0.5) * 0.4,
      life: 0,
      max:  1,
    });
  }

  // Schedule random shooting stars
  function scheduleShoot() {
    spawnShoot();
    setTimeout(scheduleShoot, Math.random() * 5000 + 3000);
  }
  setTimeout(scheduleShoot, 2500);

  let totalityLevel = 0; // 0–1, driven by updateState

  function drawStars(ts) {
    const W = sCvs.width, H = sCvs.height;
    sCtx.clearRect(0, 0, W, H);

    // Draw stars with twinkle
    stars.forEach(s => {
      const twinkle = Math.sin(s.phase + ts * s.freq) * s.amp;
      // At totality, boost opacity
      const toBoost = totalityLevel * (0.6 - s.base);
      const alpha = Math.max(0, Math.min(1, s.base + twinkle + toBoost));
      sCtx.beginPath();
      sCtx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      sCtx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
      sCtx.fill();
    });

    // Draw shooting stars
    for (let i = shoots.length - 1; i >= 0; i--) {
      const sh = shoots[i];
      sh.life = Math.min(sh.life + sh.speed * 16, sh.max); // ~60fps step
      if (sh.life >= sh.max) { shoots.splice(i, 1); continue; }

      const prog = sh.life; // 0→1
      // fade in first 20%, hold, fade out last 30%
      const fadeIn  = Math.min(prog / 0.2, 1);
      const fadeOut = prog > 0.7 ? 1 - (prog - 0.7) / 0.3 : 1;
      const alpha   = fadeIn * fadeOut * 0.8;

      const tx = sh.x * W + Math.cos(sh.angle) * sh.len * prog;
      const ty = sh.y * H + Math.sin(sh.angle) * sh.len * prog;
      const hx = tx - Math.cos(sh.angle) * Math.min(sh.len * 0.35, sh.len * prog);
      const hy = ty - Math.sin(sh.angle) * Math.min(sh.len * 0.35, sh.len * prog);

      const g = sCtx.createLinearGradient(hx, hy, tx, ty);
      g.addColorStop(0, `rgba(255,255,255,0)`);
      g.addColorStop(1, `rgba(255,255,255,${alpha.toFixed(3)})`);

      sCtx.beginPath();
      sCtx.moveTo(hx, hy);
      sCtx.lineTo(tx, ty);
      sCtx.strokeStyle = g;
      sCtx.lineWidth = 1.2;
      sCtx.stroke();
    }

    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // ── GLOW SIZING ───────────────────────────────────────
  // At totality: mid glow expands outward
  function setGlowSize(glowLevel) {
    // glowLevel: 0–1
    const midInset  = -60  - glowLevel * 60;   // -60 → -120px
    const farInset  = -120 - glowLevel * 100;   // -120 → -220px
    const px = v => `${Math.round(v)}px`;

    glowMid.style.inset = px(midInset);
    glowFar.style.inset = px(farInset);
  }
  setGlowSize(0);

  // ── STATE UPDATE ──────────────────────────────────────
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  let prevAtTotality = false;

  function updateState(moonY) {
    const frac       = clamp(moonY / MOON_MAX, 0, 1); // 0 at totality, 1 away
    const proximity  = 1 - frac;
    const atTotality = moonY <= TOTALITY;

    // ── GLOW: only appear in final 35% of moon travel, quadratic ease ──
    const glowT      = clamp((proximity - 0.65) / 0.35, 0, 1);
    const glowEased  = glowT * glowT * glowT; // cubic — crisp hold then pop

    glowMid.style.opacity   = glowEased * 0.9;
    glowInner.style.opacity = glowEased * 1.0;
    glowFar.style.opacity   = glowEased * 0.75;
    setGlowSize(glowEased);

    // Ring appears at totality only, with breathing animation
    if (atTotality && !prevAtTotality) {
      glowRing.style.opacity = 1;
      glowRing.classList.add('active');
    } else if (!atTotality && prevAtTotality) {
      glowRing.style.opacity = 0;
      glowRing.classList.remove('active');
      // fade out mid/far quickly on exit
    }
    if (!atTotality) {
      glowRing.style.opacity = Math.max(0, glowEased - 0.1) > 0.8 ? 1 : glowEased * 1.2;
    }

    // Chromosphere
    chromo.style.boxShadow = atTotality
      ? '0 0 0 1.5px rgba(200,45,15,0.50), 0 0 6px 2px rgba(180,35,10,0.18)'
      : '0 0 0 0 transparent';

    // Stars totality level for canvas
    totalityLevel = glowEased;

    prevAtTotality = atTotality;
    scrollCue.classList.toggle('hidden', window.scrollY > 40);
  }

  function setMoonY(y) {
    moon.style.transform = `translateY(${y}px)`;
    updateState(y);
  }

  // ── ENTRY ─────────────────────────────────────────────
  window.scrollTo(0, 0);
  document.body.style.overflow = 'hidden';
  setMoonY(MOON_MAX);

  function easeOutExpo(t) { return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t); }

  let entryStart = null, entryDone = false, scrollLocked = true;

  function runEntry(ts) {
    if (!entryStart) entryStart = ts;
    const t = Math.min((ts - entryStart) / ENTRY_MS, 1);
    setMoonY(MOON_MAX * (1 - easeOutExpo(t)));
    if (t < 1) {
      requestAnimationFrame(runEntry);
    } else {
      setMoonY(0);
      entryDone = true;
      setTimeout(() => { document.body.style.overflow = ''; scrollLocked = false; }, 800);
    }
  }
  setTimeout(() => requestAnimationFrame(runEntry), 3000);

  // ── SCROLL ────────────────────────────────────────────
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!entryDone || scrollLocked) return;
    if (!ticking) {
      requestAnimationFrame(() => {
        ticking = false;
        const max  = document.body.scrollHeight - window.innerHeight;
        const frac = max > 0 ? window.scrollY / max : 0;
        setMoonY(frac * MOON_MAX);
      });
      ticking = true;
    }
  }, { passive: true });

})();
</script>
</body>
</html>
